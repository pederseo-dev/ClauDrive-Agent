<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Cloud Code Chat</title>
    <style>
      body { background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 20px; margin: 0; }
      h1 { font-size: 16px; color: #00aaff; margin-bottom: 20px; }
      #log { font-size: 13px; line-height: 1.8; }
      .line { border-bottom: 1px solid #333; padding: 4px 0; }
    </style>
  </head>
  <body>
    <h1>☁️ Cloud Code Chat v0.1.0</h1>
    <div id="log"></div>

    <script>
      const { ipcRenderer } = require('electron')
      const log = document.getElementById('log')

      function addLine(msg) {
        const div = document.createElement('div')
        div.className = 'line'
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
        log.prepend(div)
      }

      addLine('Iniciando...')

      ipcRenderer.on('status', (event, msg) => {
        addLine(msg)
      })
    </script>
  </body>
</html>
